## Composition Integration Points

**See**: `integration-contracts.md` for concrete contract examples (API schemas, event formats, database DDL)

layer_1_to_layer_2:
  description: "Digital Twin defines domain boundaries, each domain operates marketplace"

  contracts:
    - name: "Domain Registry API"
      format: "REST API (OpenAPI 3.0)"
      purpose: "Catalog_Manager (L2) queries Domain_Registry (L1) for domain list"
      example: "GET /api/v1/domains → returns BusinessDomain[]"
      schema_location: "integration-contracts.md#contract-1"

    - name: "Domain Ownership Events"
      format: "Event Stream (Avro schema)"
      purpose: "Provider_Portal (L2) syncs access control when ownership changes"
      topic: "domain-ownership-events"
      schema_location: "integration-contracts.md#contract-2"

    - name: "Domain Metrics View"
      format: "SQL Database View"
      purpose: "Quality_Rating_System (L2) displays domain health alongside product quality"
      view: "domain_health_metrics"
      schema_location: "integration-contracts.md#contract-3"

  data_flow:
    - Domain_Registry (L1) → REST API → Catalog_Manager (L2) organizes catalog by domain
    - Domain_Ownership_Manager (L1) → Kafka events → Provider_Portal (L2) updates permissions
    - DomainMetrics (L1) → SQL view → Quality_Rating_System (L2) shows health

  contract_enforcement:
    - OpenAPI validation (Catalog_Manager rejects invalid requests)
    - Avro schema validation (Kafka rejects malformed events)
    - SQL foreign keys (referential integrity enforced)

layer_2_to_layer_3:
  description: "Marketplaces publish to federated systems, governed by global policies"

  contracts:
    - name: "Data Product Registration API"
      format: "REST API (OpenAPI 3.0)"
      purpose: "Provider_Portal (L2) registers products with Federated_Catalog (L3)"
      example: "POST /api/v1/catalog/products → registers DataProduct with schema, SLOs, dependencies"
      schema_location: "integration-contracts.md#contract-4"

    - name: "Schema Registry Protocol"
      format: "Confluent Schema Registry API"
      purpose: "Provider_Portal (L2) registers Avro/Protobuf schemas for version management"
      endpoint: "POST /subjects/{product_name}-value/versions"
      schema_location: "integration-contracts.md#contract-5"

    - name: "Lineage Extraction Events"
      format: "Event Stream (OpenLineage standard)"
      purpose: "Data pipelines (L2) emit lineage to Cross_Domain_Lineage_Tracker (L3)"
      topic: "openlineage-events"
      schema_location: "integration-contracts.md#contract-6"

  data_flow:
    - Provider_Portal (L2) → REST API → Federated_Catalog_Aggregator (L3) indexes product
    - Provider_Portal (L2) → Schema Registry API → Schema_Registry (L3) validates compatibility
    - Data Pipeline (L2) → OpenLineage events → Cross_Domain_Lineage_Tracker (L3) builds graph
    - Federated_Governance_Engine (L3) → validates DataContract before accepting registration

  contract_enforcement:
    - Governance validation (L3 rejects products that violate PII policies)
    - Schema compatibility checks (L3 blocks backward-incompatible changes)
    - OpenLineage standard format (lineage events must conform to spec)

layer_1_to_layer_3:
  description: "Platform operates at org level, serves all domains"

  contracts:
    - name: "Platform Provisioning Webhook"
      format: "Webhook (JSON Schema)"
      purpose: "Domain_Registry (L1) triggers Self_Serve_Data_Platform (L3) to provision infrastructure"
      event_types: ["domain.created", "domain.status_changed"]
      schema_location: "integration-contracts.md#contract-7"

    - name: "Cost Allocation Database"
      format: "SQL Database Schema"
      purpose: "DomainMetrics (L1) and Platform (L3) share cost data for chargeback"
      schema: "cost_allocation"
      tables: ["domain_costs", "platform_costs", "domain_total_costs (view)"]
      schema_location: "integration-contracts.md#contract-8"

  data_flow:
    - Domain_Registry (L1) → Webhook → Self_Serve_Data_Platform (L3) provisions S3, DB, IAM
    - DomainMetrics (L1) → SQL INSERT → cost_allocation.domain_costs
    - Self_Serve_Data_Platform (L3) → SQL INSERT → cost_allocation.platform_costs
    - Domain_Analytics (L1) → SQL SELECT → cost_allocation.domain_total_costs (combined view)

  contract_enforcement:
    - Webhook signature verification (prevent spoofed provisioning requests)
    - Database foreign keys (domain_id must exist in business_domains table)
    - SQL constraints (costs must be non-negative, month must be first of month)


## KPI Mapping (Business Goals → Components)

BG-001: "Scale to 100 domains without central bottleneck"
  supporting_components:
    - L3-005: Self_Serve_Data_Platform (domains provision autonomously)
    - L2-004: Provider_Portal (easy publishing)
    - L2-005: Data_Product_Builder (CLI tools reduce friction)
  measurement: "# of domains publishing without platform team tickets"

BG-002: "Improve data quality (>90% SLO compliance)"
  supporting_components:
    - L1-002: Domain_Ownership_Manager (clear accountability)
    - L2-003: Quality_Rating_System (measure SLOs)
    - L3-001: Federated_Governance_Engine (enforce standards)
  measurement: "% of products meeting SLOs"

BG-003: "Accelerate time-to-insight (<1 day)"
  supporting_components:
    - L2-001: Catalog_Manager (fast discovery)
    - L3-004: Federated_Catalog_Aggregator (search all domains)
    - L2-002: Subscription_Manager (fast access grants)
  measurement: "Median time from need to first query"

BG-004: "Enable data democratization (500+ cross-domain subscriptions)"
  supporting_components:
    - L3-004: Federated_Catalog_Aggregator (discover across domains)
    - L3-002: Cross_Domain_Lineage_Tracker (understand dependencies)
    - L2-001: Catalog_Manager (publish products)
  measurement: "# of cross-domain subscriptions"

BG-005: "Reduce costs (30% reduction)"
  supporting_components:
    - L2-002: Subscription_Manager (usage metering, chargeback)
    - L1-003: Domain_Analytics (cost visibility per domain)
    - L3-005: Self_Serve_Data_Platform (cost tracking)
  measurement: "Total cloud bill (before/after)"


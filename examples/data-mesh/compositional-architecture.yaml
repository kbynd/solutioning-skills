## LEVEL 3: Integration Across Domains

archetype: "Integration Platform"
what_integrates: "Data products across domains"
scope: "Cross-domain (organization-wide)"
ownership: "Platform Team (infrastructure) + Governance Team (policies)"

archetype_rationale: |
  While each domain operates independently (Level 2), cross-domain integration is
  needed for interoperability. The Integration Platform provides federated catalog
  (unified search), federated governance (global policies), and cross-domain lineage
  (track dependencies between domains).

ontology:
  entity_types:

    DataLineage:
      description: "Supply chain tracking (cross-domain dependencies)"
      properties:
        - lineage_id: "unique identifier"
        - lineage_type: "product_level, column_level"
        - upstream_product: "source data product"
        - downstream_product: "derived data product"
        - transformation: "how upstream → downstream (SQL, code)"
      relationships:
        - from: DataProduct (supplier domain)
        - to: DataProduct (consumer domain)

    GlobalPolicy:
      description: "Organization-wide governance rules"
      properties:
        - policy_id: "unique identifier"
        - policy_type: "privacy (PII masking), security (encryption), retention (7-year)"
        - policy_rule: "machine-readable rule"
        - enforcement: "automated or manual"
      relationships:
        - applies_to: DataProduct[]

    SchemaRegistry:
      description: "Centralized schema catalog for interoperability"
      properties:
        - registry_id: "unique identifier"
        - schema_format: "Avro, Protobuf, JSON Schema"
        - compatibility_mode: "backward, forward, full"
      operations:
        - register_schema: "Domain registers product schema"
        - validate_compatibility: "Check new version compatible"
        - retrieve_schema: "Consumer fetches schema for parsing"

    FederatedCatalog:
      description: "Unified search across all domain catalogs"
      properties:
        - catalog_id: "unique identifier"
        - indexed_domains: "list of domains included"
        - search_index: "aggregated index from all domains"
      operations:
        - federated_search: "Search across all domains"
        - aggregate_metadata: "Combine metadata from domain catalogs"

solution_components:

  L3-001: Federated_Governance_Engine
    purpose: "Enforce global policies (API_Orchestrator for policies)"
    entity_types_owned: [GlobalPolicy, DataContract (validation)]
    operations:
      - define_policy: "Organization sets PII, encryption, retention rules"
      - validate_contract: "Check schema compatibility, SLO feasibility"
      - enforce_interoperability: "Ensure standard formats (Parquet, Avro)"
      - audit_compliance: "Verify domains adhere to policies"

  L3-002: Cross_Domain_Lineage_Tracker
    purpose: "Track data flows between domains (Event_Router)"
    entity_types_owned: [DataLineage]
    operations:
      - extract_lineage: "Parse SQL, Spark jobs for dependencies"
      - map_column_lineage: "Field X from Domain A → Field Y in Domain B"
      - visualize_lineage: "Graph UI showing cross-domain flows"
      - impact_analysis: "What breaks if Domain A changes schema?"
      - notify_consumers: "Alert downstream domains of changes"

  L3-003: Schema_Registry
    purpose: "Centralized schema catalog (Transformation mapping)"
    entity_types_owned: [SchemaRegistry]
    operations:
      - register_schema: "Domain registers product schema"
      - validate_compatibility: "Check backward/forward compatibility"
      - retrieve_schema: "Consumer fetches schema"
      - enforce_standards: "All schemas use Avro/Protobuf/JSON"

  L3-004: Federated_Catalog_Aggregator
    purpose: "Unified search across domain catalogs (Connector_Registry)"
    entity_types_owned: [FederatedCatalog]
    operations:
      - aggregate_catalogs: "Combine metadata from all domains"
      - federated_search: "Search across all domain catalogs"
      - global_recommendations: "Suggest products from any domain"

  L3-005: Self_Serve_Data_Platform
    purpose: "Platform infrastructure enabling domain autonomy"
    entity_types_owned: [None - platform layer]
    operations:
      - provision_storage: "Create S3 bucket, database, table for domain"
      - deploy_pipeline: "Run ETL/ELT jobs defined by domain"
      - expose_output_port: "Generate SQL endpoint, API, streaming topic"
      - enforce_policies: "Apply encryption, PII masking automatically"
      - track_costs: "Monitor spend per domain"

required_capabilities:
  - Governance enforcement (OPA, cloud IAM, policy-as-code)
  - Lineage extraction (OpenLineage, dbt, custom parsers)
  - Lineage storage (Neo4j, PostgreSQL graph)
  - Schema registry (Confluent Schema Registry, AWS Glue)
  - Federated catalog (DataHub, OpenMetadata, Amundsen)
  - Infrastructure-as-code (Terraform, Pulumi)
  - Multi-tenancy (Kubernetes namespaces, cloud accounts)


## Team Structure (Conway's Law)

teams:

  Domain_Teams:
    count: "50 (one per business domain)"
    owns_levels: [1 (domain content), 2 (marketplace content)]
    responsibilities:
      - Define domain boundaries (Level 1)
      - Own data products (Level 2)
      - Publish to catalog (Level 2)
      - Meet SLOs (Level 2)
      - Respond to consumers (Level 2)
    components_owned:
      - Domain content in Domain_Registry (L1)
      - Data products in Catalog_Manager (L2)
      - Subscriptions managed via Subscription_Manager (L2)

  Platform_Team:
    count: "1 (centralized)"
    owns_levels: [1 (infrastructure), 3 (full)]
    responsibilities:
      - Operate Domain_Registry (Level 1 infra)
      - Build self-serve platform (Level 3)
      - Enforce global policies (Level 3)
      - Maintain federated catalog (Level 3)
      - Optimize costs (Level 3)
    components_owned:
      - Domain_Registry, Domain_Ownership_Manager, Domain_Analytics (L1)
      - Self_Serve_Data_Platform, Federated_Catalog_Aggregator (L3)

  Governance_Team:
    count: "1 (federated: representatives from domains + central)"
    owns_levels: [3 (policies)]
    responsibilities:
      - Define global policies (Level 3)
      - Validate data contracts (Level 3)
      - Audit compliance (Level 3)
    components_owned:
      - Federated_Governance_Engine, Schema_Registry (L3)

  Data_Product_Support_Team:
    count: "1 (centralized, optional)"
    owns_levels: [2 (shared services)]
    responsibilities:
      - Maintain data product builder tools (Level 2)
      - Monitor SLO compliance (Level 2)
      - Support domains with quality issues (Level 2)
    components_owned:
      - Data_Product_Builder, Quality_Rating_System (L2)


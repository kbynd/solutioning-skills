## Composition Integration Points

layer_1_to_layer_2:
  description: "Digital Twin defines domain boundaries, each domain operates marketplace"
  contracts:
    - Domain boundaries: "Which domain owns which data? (from Domain_Registry)"
    - Domain ownership: "Who can publish products for this domain? (from Domain_Ownership_Manager)"
  flow:
    - Domain_Registry (L1) → defines domains → Catalog_Manager (L2) organizes by domain
    - DomainTeam (L1) → owns domain → Provider_Portal (L2) publishes products
    - DomainMetrics (L1) → tracks domain health → Domain_Analytics (L1) + Quality_Rating_System (L2)

layer_2_to_layer_3:
  description: "Marketplaces publish to federated systems, governed by global policies"
  contracts:
    - Data contracts: "Schema, SLOs for each product (validated by L3)"
    - Global policies: "PII, encryption, retention (enforced by L3)"
  flow:
    - Catalog_Manager (L2) → publishes metadata → Federated_Catalog_Aggregator (L3)
    - DataProduct (L2) → schema registered → Schema_Registry (L3)
    - DataProduct (L2) → lineage extracted → Cross_Domain_Lineage_Tracker (L3)
    - Provider_Portal (L2) → validates contract → Federated_Governance_Engine (L3)

layer_1_to_layer_3:
  description: "Platform operates at org level, serves all domains"
  contracts:
    - Platform SLAs: "Uptime, performance guarantees"
    - Cost allocation: "Chargeback per domain"
  flow:
    - Domain_Registry (L1) → lists all domains → Self_Serve_Data_Platform (L3) provisions resources
    - DomainMetrics (L1) → cost tracking → cost allocated to domains


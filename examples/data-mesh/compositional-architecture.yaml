## LEVEL 3: Integration Across Domains

archetypes: "Integration Platform + Supply Chain Network (complementary)"
what_integrates: "Independent domain marketplaces (Integration) + Multi-stage data flows (Supply Chain)"
scope: "Cross-domain (organization-wide)"
ownership: "Platform Team (infrastructure) + Governance Team (policies)"

archetype_rationale: |
  Level 3 uses TWO complementary archetypes from reality:

  1. Integration Platform (connect independent systems):
     - Pre-digital: Postal systems connecting cities, trade route networks
     - Function: Enable interoperability between autonomous domains
     - Components: Schema_Registry (standard formats), Federated_Catalog (unified search),
                   Federated_Governance_Engine (global policies)

  2. Supply Chain Network (track multi-stage transformations):
     - Pre-digital: Silk Road (China → Persia → Venice), Medieval wool trade (Shepherd → Weaver → Tailor)
     - Function: End-to-end visibility of transformations and quality propagation
     - Components: Cross_Domain_Lineage_Tracker (full chain visibility),
                   Impact_Analyzer (upstream change → downstream alert),
                   Quality_Propagation_Tracker (SLO violations cascade)

  These are DIFFERENT patterns solving DIFFERENT problems:
  - Integration: "How do independent domains interoperate?" (standards, catalog, governance)
  - Supply Chain: "Where did this come from?" (provenance, trust, quality propagation)

  Both needed: Integration enables communication, Supply Chain enables trust.

ontology:
  entity_types:

    # From Integration Platform Archetype
    # (Enabling interoperability between independent systems)

    GlobalPolicy:
      description: "Organization-wide governance rules (Integration Platform)"
      archetype_attribution: "Integration Platform"
      pre_digital_example: "City trade laws, guild quality standards"
      properties:
        - policy_id: "unique identifier"
        - policy_type: "privacy (PII masking), security (encryption), retention (7-year)"
        - policy_rule: "machine-readable rule (OPA Rego, SQL)"
        - enforcement: "automated (policy-as-code) or manual (approval)"
        - violation_consequence: "block publish, alert, audit log"
      relationships:
        - applies_to: DataProduct[]
        - enforced_by: Federated_Governance_Engine

    SchemaRegistry:
      description: "Centralized schema catalog for interoperability (Integration Platform)"
      archetype_attribution: "Integration Platform"
      pre_digital_example: "Standard weights & measures, currency exchange rates"
      properties:
        - registry_id: "unique identifier"
        - schema_format: "Avro, Protobuf, JSON Schema"
        - compatibility_mode: "backward, forward, full"
        - version_history: "all schema versions"
      operations:
        - register_schema: "Domain registers product schema"
        - validate_compatibility: "Check backward/forward compatibility"
        - retrieve_schema: "Consumer fetches schema for parsing"
        - enforce_standards: "All schemas use approved formats"

    FederatedCatalog:
      description: "Unified search across all domain catalogs (Integration Platform)"
      archetype_attribution: "Integration Platform"
      pre_digital_example: "Trade route maps, city-wide merchant directories"
      properties:
        - catalog_id: "unique identifier"
        - indexed_domains: "list of domains included"
        - search_index: "aggregated index from all domains"
        - last_sync: "when catalogs aggregated"
      operations:
        - federated_search: "Search across all domain catalogs"
        - aggregate_metadata: "Combine metadata from domain catalogs"
        - global_recommendations: "Suggest products from any domain"

    # From Supply Chain Network Archetype
    # (Tracking multi-stage flows and provenance)

    DataLineage:
      description: "End-to-end supply chain tracking (Supply Chain Network)"
      archetype_attribution: "Supply Chain Network"
      pre_digital_example: "Silk Road tracking (China → Persia → Venice), wool trade chain"
      properties:
        - lineage_id: "unique identifier"
        - lineage_type: "product_level, column_level, row_level"
        - upstream_product: "source data product (supplier)"
        - downstream_product: "derived data product (consumer)"
        - transformation: "how upstream → downstream (SQL, Spark, Python)"
        - lineage_depth: "number of hops from raw sources"
        - full_chain: "Root sources → all transformations → end product"
      relationships:
        - from: DataProduct (supplier domain)
        - to: DataProduct (consumer domain)
        - tracked_by: Cross_Domain_Lineage_Tracker

    QualityPropagation:
      description: "How quality violations cascade through supply chain (Supply Chain Network)"
      archetype_attribution: "Supply Chain Network"
      pre_digital_example: "Bad wheat → bad flour → bad bread (defect propagation)"
      properties:
        - propagation_id: "unique identifier"
        - root_violation: "which upstream product broke SLO"
        - affected_chain: "all downstream products impacted"
        - severity: "critical (breaks downstream) | warning (degrades quality)"
        - resolution_status: "root cause fixed, propagation cleared"
      relationships:
        - originates_from: DataProduct (root cause)
        - propagates_to: DataProduct[] (all downstream)

    ImpactAnalysis:
      description: "What breaks if this changes? (Supply Chain Network)"
      archetype_attribution: "Supply Chain Network"
      pre_digital_example: "If wool supplier goes bankrupt, which tailors affected?"
      properties:
        - analysis_id: "unique identifier"
        - change_type: "schema change, SLO change, deprecation"
        - source_product: "product being changed"
        - impacted_products: "downstream products affected"
        - blast_radius: "number of hops affected"
        - mitigation: "notification sent, migration path provided"
      relationships:
        - change_at: DataProduct (source)
        - impacts: DataProduct[] (downstream consumers)

solution_components:

  # From Integration Platform Archetype
  # (Components that enable interoperability between independent domains)

  L3-001: Federated_Governance_Engine
    purpose: "Enforce global policies across autonomous domains"
    archetype_attribution: "Integration Platform"
    pre_digital_analog: "City inspectors enforcing weights & measures across guilds"
    entity_types_owned: [GlobalPolicy, DataContract (validation)]
    operations:
      - define_policy: "Organization sets PII, encryption, retention rules (policy-as-code)"
      - validate_contract: "Check schema compatibility, SLO feasibility before publish"
      - enforce_interoperability: "Ensure standard formats (Parquet, Avro, JSON)"
      - audit_compliance: "Verify domains adhere to policies (automated checks)"
      - block_violations: "Prevent publishing products that violate policies"

  L3-003: Schema_Registry
    purpose: "Centralized schema catalog for interoperability"
    archetype_attribution: "Integration Platform"
    pre_digital_analog: "Standard weights & measures office"
    entity_types_owned: [SchemaRegistry]
    operations:
      - register_schema: "Domain registers product schema"
      - validate_compatibility: "Check backward/forward compatibility"
      - retrieve_schema: "Consumer fetches schema for parsing"
      - enforce_standards: "All schemas use approved formats"
      - version_management: "Track schema evolution across domains"

  L3-004: Federated_Catalog_Aggregator
    purpose: "Unified search across independent domain catalogs"
    archetype_attribution: "Integration Platform"
    pre_digital_analog: "City-wide merchant directory, trade route maps"
    entity_types_owned: [FederatedCatalog]
    operations:
      - aggregate_catalogs: "Combine metadata from all domain catalogs"
      - federated_search: "Search across all domain catalogs (single search box)"
      - global_recommendations: "Suggest products from any domain (based on usage)"
      - sync_metadata: "Keep federated view up-to-date with domain changes"

  L3-005: Self_Serve_Data_Platform
    purpose: "Platform infrastructure enabling domain autonomy"
    archetype_attribution: "Integration Platform"
    pre_digital_analog: "Shared city infrastructure (roads, utilities, currency)"
    entity_types_owned: [None - platform layer]
    operations:
      - provision_storage: "Create S3 bucket, database, table for domain"
      - deploy_pipeline: "Run ETL/ELT jobs defined by domain"
      - expose_output_port: "Generate SQL endpoint, API, streaming topic"
      - enforce_policies: "Apply encryption, PII masking automatically"
      - track_costs: "Monitor spend per domain (cost allocation)"

  # From Supply Chain Network Archetype
  # (Components that track multi-stage flows and enable trust through provenance)

  L3-002: Cross_Domain_Lineage_Tracker
    purpose: "Track end-to-end data supply chains across domains"
    archetype_attribution: "Supply Chain Network"
    pre_digital_analog: "Trade route tracking, supply chain provenance (Silk Road documentation)"
    entity_types_owned: [DataLineage, ImpactAnalysis]
    operations:
      - extract_lineage: "Parse SQL, Spark jobs for dependencies (automatic)"
      - aggregate_chains: "Build full lineage: Root sources → all hops → end product"
      - map_column_lineage: "Field X from Domain A → Field Y in Domain B (granular)"
      - visualize_lineage: "Graph UI showing cross-domain flows (network diagram)"
      - calculate_depth: "How many hops from raw sources? (lineage_depth metric)"

  L3-006: Impact_Analyzer
    purpose: "Predict blast radius of changes through supply chain"
    archetype_attribution: "Supply Chain Network"
    pre_digital_analog: "Analyzing impact of supplier bankruptcy on downstream merchants"
    entity_types_owned: [ImpactAnalysis]
    operations:
      - analyze_change: "Product A schema change → which downstream products break?"
      - calculate_blast_radius: "How many hops affected? How many consumers?"
      - notify_consumers: "Alert all downstream domains BEFORE breaking change"
      - provide_migration: "Offer migration path (upgrade guide, compatibility layer)"
      - track_acknowledgment: "Did all downstream teams acknowledge change?"

  L3-007: Quality_Propagation_Tracker
    purpose: "Track how SLO violations cascade through supply chain"
    archetype_attribution: "Supply Chain Network"
    pre_digital_analog: "Bad wheat → bad flour → bad bread (defect tracking)"
    entity_types_owned: [QualityPropagation]
    operations:
      - detect_root_violation: "Product A broke freshness SLO"
      - trace_downstream: "Which products depend on A? (follow lineage chain)"
      - propagate_alert: "Notify all downstream: 'Your input is stale'"
      - calculate_impact: "How many end consumers affected?"
      - track_resolution: "Root cause fixed → clear propagation alerts"

  L3-008: Provenance_Verifier
    purpose: "Verify ethical sourcing through full lineage chain"
    archetype_attribution: "Supply Chain Network"
    pre_digital_analog: "Guild certifications, origin stamps on goods"
    entity_types_owned: [DataLineage (compliance checks)]
    operations:
      - verify_compliance: "All upstream products meet governance policies?"
      - check_pii_handling: "PII sources properly masked/encrypted?"
      - validate_carbon_footprint: "Computational cost acceptable?"
      - audit_sourcing: "Show me full provenance: Where did this data come from?"
      - certify_product: "Green checkmark: 'Ethically sourced, compliant'"

required_capabilities:

  # From Integration Platform Archetype
  - Governance enforcement (OPA for policy-as-code, cloud IAM, automated validation)
  - Schema registry (Confluent Schema Registry, AWS Glue Schema Registry)
  - Federated catalog (DataHub, OpenMetadata, Amundsen for unified search)
  - Infrastructure-as-code (Terraform, Pulumi for self-service platform)
  - Multi-tenancy (Kubernetes namespaces, cloud accounts for domain isolation)

  # From Supply Chain Network Archetype
  - Lineage extraction (OpenLineage, dbt lineage, Spark lineage parsers)
  - Lineage storage (Neo4j graph database, PostgreSQL with pg_graph)
  - Lineage visualization (NetworkX, D3.js force graphs for supply chain view)
  - Impact analysis (Custom algorithms for blast radius calculation)
  - Quality propagation (Event streaming for cascading SLO violations)
  - Provenance tracking (Audit trail for compliance verification)


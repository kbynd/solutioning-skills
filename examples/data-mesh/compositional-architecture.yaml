# Data Mesh - Compositional Architecture

composition_type: "Layered + Nested"
composition_levels: 3
primary_pattern: "Digital Twin (business) → Marketplace (per domain) → Integration (cross-domain)"

---

## LEVEL 1: Digital Twin of Business Structure

archetype: "Digital Twin with Ontology-Based Operations"
what_is_mirrored: "Business domains (organizational structure, capabilities)"
scope: "Organization-wide"
ownership: "Platform Team (infrastructure) + Domain Teams (content)"

archetype_rationale: |
  Business domains are the "physical assets" being tracked. The organization chart
  and business capabilities are mirrored digitally in the Domain Registry. As the
  business restructures (merges, splits domains), the digital twin stays synchronized.

ontology:
  entity_types:

    BusinessDomain:
      description: "Digital representation of organizational unit (PhysicalAsset equivalent)"
      properties:
        - domain_id: "unique identifier"
        - domain_name: "Sales, Marketing, Supply Chain, Customer Service"
        - domain_type: "operational, analytical, supporting"
        - bounded_context: "DDD bounded context (domain scope)"
        - status: "active, restructuring, merged, dissolved"
      relationships:
        - part_of: Organization
        - owned_by: DomainTeam
        - produces: DataProduct[]

    DomainCapability:
      description: "What the domain does (Process equivalent)"
      properties:
        - capability_id: "unique identifier"
        - capability_name: "Customer Acquisition, Order Fulfillment, Risk Assessment"
        - capability_type: "core, supporting, generic"
        - maturity_level: "initial, managed, defined, optimized"
      relationships:
        - provided_by: BusinessDomain

    DomainTeam:
      description: "People in domain (Actor equivalent)"
      properties:
        - team_id: "unique identifier"
        - team_name: "Sales Analytics Team, Supply Chain Data Team"
        - team_size: "number of people"
        - skills: "data engineering, domain expertise, ML"
      relationships:
        - owns: BusinessDomain
        - publishes: DataProduct[]

    DomainMetrics:
      description: "Telemetry from business (Measurement equivalent)"
      properties:
        - metric_id: "unique identifier"
        - metric_type: "products_count, quality_score, usage_total, cost_total"
        - value: "numeric value"
        - timestamp: "when measured"
      relationships:
        - about: BusinessDomain

solution_components:

  L1-001: Domain_Registry
    purpose: "Master data for business domains (Asset_Registry)"
    entity_types_owned: [BusinessDomain, DomainCapability]
    operations:
      - create_domain: "New business unit → register in digital twin"
      - update_domain_boundary: "Org restructure → update scope"
      - query_domains: "Which domains exist? What do they own?"

  L1-002: Domain_Ownership_Manager
    purpose: "Sync business reality → digital twin (State_Synchronizer)"
    entity_types_owned: [DomainTeam]
    operations:
      - assign_ownership: "Person A owns Domain B → update twin"
      - track_team_changes: "Team size changed → update metrics"
      - detect_ownership_gaps: "Domain has no owner → alert"

  L1-003: Domain_Analytics
    purpose: "Analyze domain health (Performance_Analyzer)"
    entity_types_owned: [DomainMetrics]
    operations:
      - calculate_domain_health: "Quality score, product count, usage"
      - predict_quality_issues: "Domain X trending toward violations"
      - benchmark_domains: "Domain A vs. Domain B performance"

  L1-004: Domain_Catalog_UI
    purpose: "Visualize domain landscape (Digital_Twin_Viewer)"
    entity_types_owned: [None - reads all]
    operations:
      - render_org_structure: "Show all domains in org chart"
      - show_domain_health: "Green, yellow, red status"
      - display_domain_products: "What does this domain produce?"

required_capabilities:
  - Domain registry storage (PostgreSQL, MongoDB)
  - Ownership tracking (IAM integration, LDAP sync)
  - Metrics collection (Prometheus, CloudWatch)
  - Visualization UI (React, D3.js for org chart)

---

## LEVEL 2: Marketplace Per Domain

archetype: "Marketplace/Portal"
what_is_traded: "Data products (tradeable commodities)"
scope: "Per domain (each domain = one marketplace instance)"
ownership: "Domain Teams (each domain owns their marketplace)"

archetype_rationale: |
  Each business domain operates as a marketplace seller, publishing data products
  as tradeable commodities. Data consumers are buyers who discover, subscribe, and
  consume products. SLO compliance acts as product ratings/reviews. Usage is metered
  and costs are allocated via chargeback.

ontology:
  entity_types:

    DataProduct:
      description: "Prosumer node in data supply chain - both produces and consumes data"
      archetype_attribution: "Marketplace/Portal (offering) + Supply Chain (node in flow)"
      properties:
        # Product identity
        - product_id: "unique identifier"
        - product_name: "customer_360, order_history"
        - product_description: "what data, use cases, examples"
        - product_owner: "person responsible (seller contact)"

        # Product offering (Marketplace archetype)
        - schema: "data contract (fields, types, constraints)"
        - output_ports: "consumption interfaces (SQL, API, S3)"
        - slo_targets: "quality guarantees (freshness, completeness, accuracy)"
        - pricing_model: "chargeback formula (per query, per GB, flat rate)"
        - quality_score: "aggregated SLO compliance % (like product rating)"
        - popularity_score: "# of consumers, queries/day"
        - marketplace_status: "draft, published, active, deprecated, retired"
        - version: "semantic version (v1.0.0, v2.1.3)"

        # Prosumer - Supply chain position (Supply Chain archetype)
        - input_dependencies:
            - source_product_id: "upstream DataProduct ID (what this consumes)"
            - source_domain: "which domain provides input"
            - dependency_type: "required (breaks without) | optional (enrichment)"
            - slo_propagation: "if upstream breaks SLO, I break (quality cascade)"
            - usage_pattern: "aggregation | join | filter | pass-through"

        - output_consumers:
            - consumer_product_id: "downstream DataProduct ID (who consumes me)"
            - consumer_domain: "which domain consumes output"
            - impact_level: "critical (they break) | moderate | low"
            - breaking_change_risk: "schema change breaks consumer pipeline"

        # Provenance & Trust (Supply Chain archetype)
        - lineage_chain: "Full path from source systems (e.g., Payments.raw → Sales.customer_360)"
        - lineage_depth: "number of hops from root sources (0 = raw source, 1 = derived once)"
        - pii_sources: "Which upstream products contain PII? (compliance tracking)"
        - compliance_requirements: "Inherited from upstream (GDPR, CCPA, encryption)"
        - ethical_sourcing_verified: "All upstream products meet governance policies?"
        - carbon_footprint: "Computational cost of full lineage chain (CPU-hours, cost)"

      relationships:
        - offered_by: BusinessDomain (from Level 1)
        - produced_by: DomainTeam (from Level 1)
        - consumed_by: Subscription[]
        - sources_from: DataProduct[] (prosumer inputs - tracked at Level 2)
        - feeds_into: DataProduct[] (prosumer outputs - tracked at Level 2)

    DataConsumer:
      description: "Buyer/Consumer in marketplace"
      properties:
        - consumer_id: "unique identifier"
        - consumer_type: "human (analyst), system (ML pipeline), application"
        - consumer_name: "team or service name"
        - budget_allocation: "max spend per month"
      relationships:
        - subscribes_to: Subscription[]

    Subscription:
      description: "Transaction in marketplace (access grant)"
      properties:
        - subscription_id: "unique identifier"
        - subscription_date: "when access granted"
        - access_level: "read-only, read-write, admin"
        - cost_to_date: "total cost accrued"
        - status: "active, suspended, cancelled"
      relationships:
        - consumer: DataConsumer
        - product: DataProduct

    OutputPort:
      description: "Delivery mechanism for data product"
      properties:
        - port_id: "unique identifier"
        - port_type: "SQL, REST API, GraphQL, S3, Kafka"
        - endpoint: "URL or connection string"
        - authentication: "OAuth, API key, IAM role"
        - rate_limit: "queries/second, GB/day"
      relationships:
        - exposes: DataProduct

    DataContract:
      description: "Product specification (schema + SLOs)"
      properties:
        - contract_id: "unique identifier"
        - schema_version: "version"
        - schema_definition: "fields, types, constraints"
        - backward_compatible: "boolean"
        - slo_freshness: "max age (e.g., <1 hour)"
        - slo_completeness: "% required fields (>95%)"
        - slo_accuracy: "validation rules"
      relationships:
        - governs: DataProduct

    QualityRating:
      description: "Review/Rating (SLO compliance as product rating)"
      properties:
        - rating_id: "unique identifier"
        - rating_type: "slo_compliance, freshness, accuracy"
        - rating_value: "0-100% (like 5-star → 100%)"
        - measurement_date: "when measured"
        - passed_slo: "boolean"
      relationships:
        - for: DataProduct

    UsageMetrics:
      description: "Performance analytics (like product sales metrics)"
      properties:
        - metric_id: "unique identifier"
        - metric_type: "queries_per_day, unique_consumers, data_egress_gb, cost_total"
        - metric_value: "numeric value"
        - timestamp: "when measured"
      relationships:
        - about: DataProduct
        - by: DataConsumer

solution_components:

  L2-001: Catalog_Manager
    purpose: "Product catalog with search/discovery (Catalog_Manager)"
    entity_types_owned: [DataProduct (metadata)]
    operations:
      - publish_product: "Domain publishes new product to catalog"
      - search_products: "Keyword search, faceted filters"
      - recommend_products: "Suggest based on usage patterns"
      - view_product_details: "Schema, SLOs, owner, lineage"
    scope: "Per domain (each domain has catalog) OR federated (see Level 3)"

  L2-002: Subscription_Manager
    purpose: "Handle access control, usage tracking (Transaction_Processor)"
    entity_types_owned: [Subscription, UsageMetrics]
    operations:
      - request_access: "Consumer requests subscription"
      - approve_access: "Domain owner approves"
      - grant_credentials: "Issue API key, IAM role"
      - track_usage: "Queries/day, data egress, cost"
      - allocate_costs: "Chargeback to consumer team"

  L2-003: Quality_Rating_System
    purpose: "SLO monitoring as product ratings (Review_System)"
    entity_types_owned: [QualityRating]
    operations:
      - measure_slo_compliance: "Freshness, completeness, accuracy"
      - aggregate_quality_score: "Overall rating (0-100%)"
      - alert_on_violation: "Notify domain owner"
      - display_quality_metrics: "Show ratings in catalog"

  L2-004: Provider_Portal
    purpose: "Self-service for domain teams to publish (Provider_Portal)"
    entity_types_owned: [DataProduct (create/update), OutputPort]
    operations:
      - scaffold_product: "Generate boilerplate schema, code, tests"
      - define_schema: "Specify fields, types, constraints"
      - set_slos: "Define freshness, quality targets"
      - create_output_ports: "Expose SQL, API, S3 endpoints"
      - publish_to_catalog: "Register in catalog"
      - view_analytics: "Usage, consumers, quality, revenue"

  L2-005: Data_Product_Builder
    purpose: "CLI tools for creating data products"
    entity_types_owned: [None - tooling layer]
    operations:
      - init_product: "Scaffold new data product"
      - test_product: "Run data quality tests"
      - publish_product: "Deploy to platform, register in catalog"
      - version_product: "Manage schema evolution"

required_capabilities:
  - Product catalog (Elasticsearch, Meilisearch for search)
  - Subscription management (IAM, OAuth, custom RBAC)
  - Usage metering (API Gateway, custom logging)
  - Cost allocation (cloud cost APIs, chargeback system)
  - Quality monitoring (Great Expectations, Soda, dbt)
  - CLI tools (Python Click, Node.js Commander)


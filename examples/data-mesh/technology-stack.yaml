## Technology Selection Rationale Summary

key_decisions:

  open_source_first:
    decision: "Prefer OSS over commercial"
    rationale: |
      - Lower cost (no licensing fees)
      - Avoid vendor lock-in (data in open formats)
      - Community-driven innovation
    examples:
      - OpenMetadata (vs commercial: Collibra, Alation)
      - Great Expectations (vs commercial: Monte Carlo)
      - Confluent Schema Registry OSS (vs commercial: Confluent Cloud)

  aws_native_where_appropriate:
    decision: "Use AWS services where they fit"
    rationale: |
      - Already on AWS (expertise, IAM, billing)
      - Managed services reduce ops burden
      - Cost optimization (Reserved Instances, Savings Plans)
    examples:
      - RDS PostgreSQL (vs self-managed)
      - EKS (vs self-managed Kubernetes)
      - S3 (vs HDFS, object storage)
    avoided: "AWS Glue (too limited for complex workflows)"

  python_ecosystem:
    decision: "Python for data engineering"
    rationale: |
      - Team expertise (data engineers know Python)
      - Rich ecosystem (dbt, Great Expectations, Airflow, etc.)
      - Good for both ETL and ML
    examples:
      - dbt (SQL transformations)
      - Great Expectations (data quality)
      - Airflow (orchestration)

  composition_aware_design:
    decision: "Different technologies per level, integrated via contracts"
    rationale: |
      - Level 1 (Digital Twin): PostgreSQL (ACID, relational)
      - Level 2 (Marketplace): OpenMetadata (catalog), dbt/Airflow (pipelines)
      - Level 3 (Integration): OPA (policies), Schema Registry (compatibility)
      - Integration via APIs, events (not shared databases)
    ensures: "Levels evolve independently without breaking others"


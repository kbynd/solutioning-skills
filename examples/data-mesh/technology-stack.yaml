## Architectural Principles Applied

principles:

  data_longevity:
    principle: "Data lives longer than code (7+ year retention)"
    technologies:
      - PostgreSQL (SQL - open format)
      - Parquet files in S3 (open format)
      - Avro schemas (open format)
    avoided: "DynamoDB (proprietary format), vendor lock-in"

  minimize_data_stores:
    principle: "3 data stores, not 6+"
    technologies:
      - Tier 1: PostgreSQL (operational - domain registry, subscriptions)
      - Tier 2: S3 (data lake - data products as Parquet)
      - Tier 3: Elasticsearch (search - catalog search index)
    avoided: "Separate DB per component (creates fragmentation)"

  twelve_factor:
    principle: "12-Factor App compliance"
    examples:
      - Factor III: Config in env (Terraform variables, not hardcoded)
      - Factor IV: Backing services as attached resources (swap RDS instances)
      - Factor VI: Stateless processes (Lambda functions, EKS pods)
      - Factor XI: Logs as streams (CloudWatch, Datadog)

  evolutionary_architecture:
    principle: "Independent evolution (loose coupling)"
    examples:
      - Domains can upgrade pipelines without affecting others
      - Platform can upgrade OpenMetadata without breaking domains
      - Schema Registry ensures backward compatibility


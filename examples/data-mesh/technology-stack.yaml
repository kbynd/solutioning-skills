## Fitness Functions

fitness_functions:

  FF-001: Data Discovery Speed
    nfr: "<2 seconds to search data catalog"
    measurement: "Datadog APM on OpenMetadata API (p95 latency)"
    threshold: "p95 < 2000ms"
    alert: "PagerDuty if p95 > 2000ms for 5 minutes"

  FF-002: Data Consumption Speed
    nfr: "<5 minutes from approval to first query"
    measurement: "Custom metric: time from IAM role grant to first Athena query"
    threshold: "p95 < 5 minutes"
    alert: "Slack notification if p95 > 5 minutes"

  FF-003: SLO Compliance
    nfr: ">90% of products meet SLOs"
    measurement: "Datadog custom metric: (products passing SLOs / total products)"
    threshold: ">90%"
    alert: "Executive dashboard shows red if <90%"

  FF-004: Metadata Completeness
    nfr: "100% of products have schema, owner, lineage"
    measurement: "OpenMetadata data quality checks"
    threshold: "100%"
    alert: "Block publishing if metadata incomplete"

  FF-005: Schema Compatibility
    nfr: "99% of schema changes are backward-compatible"
    measurement: "Schema Registry compatibility checks (# passed / # total)"
    threshold: ">99%"
    alert: "Block publishing if incompatible change (unless explicitly allowed)"

  FF-006: Cost Per Domain
    nfr: "Track cost per domain, alert if >$1K/month"
    measurement: "AWS Cost Explorer API with cost allocation tags"
    threshold: "<$1,000/month per domain (avg)"
    alert: "Email domain owner if >$1K/month"


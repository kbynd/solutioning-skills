# Data Mesh - Technology Stack (Compositional)

composition_aware: true
levels: 3
tech_selection_approach: "Per-level with cross-level integration"

---

## NFR Extraction (From Requirements)

nfr_extraction:
  performance:
    - "Data discovery: <2 seconds (catalog search)"
    - "Data consumption: <5 minutes (approval to first query)"
    - "Data freshness: Domain-defined SLOs (real-time to daily)"

  quality:
    - "SLO coverage: 100% of products have defined SLOs"
    - "Metadata completeness: 100% (schema, owner, lineage, docs)"
    - "Schema compatibility: 99% backward-compatible changes"

  scalability:
    - "Support 100+ domains, 1000+ data products"
    - "No single point of failure"
    - "Decentralized publishing"

  governance:
    - "Compliance: 100% products comply with PII, encryption, retention"
    - "Interoperability: All products use standard formats (Parquet, Avro)"

  cost:
    - "Cost attribution: 100% costs allocated to domain/consumer"
    - "POC budget: <$100K/year for platform infrastructure"
    - "Production: Variable cost per domain (chargeback)"

---

## Cross-Level Technology Constraints

global_constraints:

  cloud_platform:
    selected: "AWS"
    rationale: |
      - Organization already on AWS (existing expertise, IAM, billing)
      - Need for multi-account strategy (domain isolation)
      - Cost management APIs for chargeback
    applies_to: [Level 1, Level 2, Level 3]

  identity_provider:
    selected: "Okta"
    rationale: |
      - Organization standard for SSO
      - OAuth 2.0 support for API authentication
      - SCIM for team/group sync (domain ownership)
    applies_to: [Level 1, Level 2, Level 3]

  observability:
    selected: "Datadog"
    rationale: |
      - Organization standard for monitoring
      - Support for metrics, logs, traces
      - Cross-account visibility (needed for federated view)
    applies_to: [Level 1, Level 2, Level 3]

  infrastructure_as_code:
    selected: "Terraform"
    rationale: |
      - Team expertise (platform team knows Terraform)
      - AWS provider mature and well-documented
      - Modular structure supports per-domain provisioning
    applies_to: [Level 3 (platform team), Level 2 (domain teams via templates)]

---

## LEVEL 1: Digital Twin of Business Structure

level: 1
archetype: "Digital Twin"
ownership: "Platform Team"

components:

  L1-001: Domain_Registry
    purpose: "Master data for business domains"
    required_capabilities:
      - ACID transactions (domain data consistency)
      - Schema management (domain ontology versioning)
      - API for registration and queries
    technology_selected: "PostgreSQL (RDS)"
    rationale: |
      - ACID guarantees for domain registry consistency
      - JSONB for flexible domain metadata (bounded contexts, capabilities)
      - pgAdmin for manual admin (org restructures)
      - Open format (SQL) - data outlives tools
    alternatives_considered:
      - "MongoDB: Good for flexible schema, but ACID weaker than PostgreSQL"
      - "DynamoDB: AWS-native, but harder to query complex relationships"
    cost: "$120/month (db.t3.small, 50GB storage)"

  L1-002: Domain_Ownership_Manager
    purpose: "Sync org structure to digital twin"
    required_capabilities:
      - IAM/LDAP integration (sync teams, groups)
      - Change event detection (org restructure triggers)
      - Ownership mapping (team to domain)
    technology_selected: "Custom Lambda + Okta API"
    rationale: |
      - Okta SCIM API provides team/group events
      - Lambda processes events, updates Domain_Registry
      - Serverless (no ops burden)
    cost: "$10/month (Lambda invocations + API calls)"

  L1-003: Domain_Analytics
    purpose: "Analyze domain health (quality, product count, usage)"
    required_capabilities:
      - Metrics aggregation (from Level 2 quality systems)
      - Time-series storage (historical trends)
      - Dashboards (domain health overview)
    technology_selected: "Datadog Dashboards + Custom Metrics"
    rationale: |
      - Already using Datadog (org standard)
      - Custom metrics from Level 2 systems pushed to Datadog
      - Dashboards show: products per domain, quality scores, usage
    cost: "$0 (included in org Datadog license)"

  L1-004: Domain_Catalog_UI
    purpose: "Visualize domain landscape (org chart view)"
    required_capabilities:
      - Web UI (React, D3.js for org chart)
      - API integration (read from Domain_Registry)
      - Authentication (Okta SSO)
    technology_selected: "React + D3.js (hosted on S3 + CloudFront)"
    rationale: |
      - Static site (low cost, high performance)
      - D3.js for interactive org chart visualization
      - CloudFront CDN for global access
    cost: "$5/month (S3 + CloudFront)"

level_1_total_cost: "$135/month (fixed, platform team budget)"

---

## LEVEL 2: Marketplace Per Domain

level: 2
archetype: "Marketplace/Portal"
ownership: "Domain Teams (50 domains)"
cost_model: "Per-domain variable cost (chargeback to domains)"

components:

  L2-001: Catalog_Manager
    purpose: "Product catalog with search/discovery"
    required_capabilities:
      - Full-text search (<2 second search results - NFR)
      - Faceted filtering (domain, schema, quality score, tags)
      - Relevance ranking (popularity, quality score)
      - Metadata storage (schema, SLOs, owner, lineage)
    technology_selected: "OpenMetadata (open-source data catalog)"
    rationale: |
      - Open-source (no licensing costs)
      - Built-in: search (Elasticsearch), metadata storage (MySQL), UI (React)
      - Supports: lineage, data quality, profiling
      - Community active, Cloud-native (Kubernetes)
      - Alternative to commercial: DataHub, Amundsen (similar capabilities)
    deployment: "EKS (Kubernetes) - shared cluster, namespace per domain"
    cost: "$2,000/month shared (EKS cluster + MySQL RDS + Elasticsearch)"
    cost_per_domain: "$40/month (allocated across 50 domains)"
    alternatives_considered:
      - "DataHub: Similar to OpenMetadata, slightly more complex setup"
      - "AWS Glue Data Catalog: AWS-native, but limited search capabilities"
      - "Amundsen: Good for search, but less active community than OpenMetadata"

  L2-002: Subscription_Manager
    purpose: "Access control, usage tracking, cost allocation"
    required_capabilities:
      - RBAC (IAM roles per consumer)
      - Usage metering (API calls, queries, data egress)
      - Cost allocation (chargeback to consumers)
      - Access request workflow (request → approve → grant)
    technology_selected: "AWS IAM + Custom Access Manager (Lambda + DynamoDB)"
    rationale: |
      - AWS IAM for actual access control (S3, Athena, API Gateway)
      - Custom Lambda workflow for access requests (Slack notifications)
      - DynamoDB stores subscriptions, usage logs
      - AWS Cost Explorer API for cost allocation
    cost_per_domain: "$20/month (Lambda + DynamoDB + API Gateway)"

  L2-003: Quality_Rating_System
    purpose: "SLO monitoring (freshness, completeness, accuracy)"
    required_capabilities:
      - Data quality testing (validate SLOs)
      - SLO aggregation (calculate quality score 0-100%)
      - Alerting (Slack, PagerDuty when SLO violated)
      - Historical tracking (quality trends)
    technology_selected: "Great Expectations + Datadog"
    rationale: |
      - Great Expectations (open-source, Python)
        - Write validation rules (freshness, completeness, accuracy)
        - Generate JSON reports (pass/fail per validation)
      - Datadog for SLO tracking
        - Push quality metrics (% passed validations)
        - Alerts when SLO violated (<90% compliance)
    cost_per_domain: "$15/month (Lambda for GE runs + Datadog metrics)"
    alternatives_considered:
      - "Soda Core: Similar to GE, SQL-based (vs Python)"
      - "dbt tests: Great for SQL transformations, but GE more flexible"
      - "Monte Carlo: Commercial, automated, but expensive ($$$)"

  L2-004: Provider_Portal
    purpose: "Self-service for domain teams to publish products"
    required_capabilities:
      - Web UI (product registration form)
      - Schema editor (define fields, types, constraints)
      - SLO configuration (set freshness, quality targets)
      - Publishing workflow (validate → register → deploy)
    technology_selected: "OpenMetadata UI + Custom Workflows"
    rationale: |
      - OpenMetadata already provides: schema editor, metadata forms
      - Custom workflows (Lambda Step Functions) for publishing validation
      - Integrates with Schema_Registry (L3) for compatibility checks
    cost: "$0 (included in OpenMetadata deployment - L2-001)"

  L2-005: Data_Product_Builder
    purpose: "CLI tools for creating data products"
    required_capabilities:
      - CLI (init, test, publish commands)
      - Scaffolding (generate schema, pipeline, tests)
      - CI/CD integration (GitHub Actions templates)
    technology_selected: "Custom Python CLI (Click framework)"
    rationale: |
      - Python Click for CLI (team knows Python)
      - Templates stored in Git (schema.yaml, pipeline.py, tests/)
      - GitHub Actions for CI/CD (run GE tests, publish to catalog)
    cost: "$0 (development time only, no runtime cost)"

  L2-XXX: Data_Pipeline_Runtime
    purpose: "Run ETL/ELT jobs for data products"
    note: "Per-domain infrastructure (each domain provisions own)"
    required_capabilities:
      - Scheduled execution (cron, time-based)
      - DAG orchestration (dependencies)
      - Scalability (handle GB to TB data)
    technology_selected: "dbt + Airflow (or AWS MWAA)"
    rationale: |
      - dbt for SQL transformations (open-source, declarative)
      - Airflow for orchestration (Python-based, flexible)
      - AWS MWAA (Managed Airflow) option for less ops burden
    cost_per_domain: "$50-500/month (depends on data volume)"
    alternatives_considered:
      - "Prefect: Modern alternative to Airflow, easier to use"
      - "Dagster: Asset-oriented, good for data products"
      - "AWS Glue: Serverless, but less flexible than Airflow"

level_2_cost_per_domain: "$125-605/month per domain (variable by usage)"
level_2_total_cost_50_domains: "$6,250-30,250/month (chargeback to domains)"

---

## LEVEL 3: Integration Across Domains

level: 3
archetype: "Integration Platform"
ownership: "Platform Team + Governance Team"

components:

  L3-001: Federated_Governance_Engine
    purpose: "Enforce global policies (PII, encryption, retention)"
    required_capabilities:
      - Policy-as-code (YAML definitions, version controlled)
      - Automated enforcement (scan data products)
      - Compliance reporting (which products compliant?)
    technology_selected: "Open Policy Agent (OPA)"
    rationale: |
      - OPA: Policy-as-code (Rego language)
      - Integrates with publishing workflow (validate before publish)
      - Policies in Git (versioned, reviewed, CI/CD tested)
      - Examples: "All PII fields must be encrypted", "Retention ≥ 7 years"
    cost: "$10/month (Lambda for OPA runtime)"
    alternatives_considered:
      - "AWS Config Rules: AWS-native, but less flexible than OPA"
      - "Custom Python validators: More work, less declarative"

  L3-002: Cross_Domain_Lineage_Tracker
    purpose: "Track data flows between domains"
    required_capabilities:
      - Lineage extraction (parse SQL, Spark jobs)
      - Graph storage (upstream/downstream relationships)
      - Visualization (lineage graph UI)
      - Impact analysis (what breaks if schema changes?)
    technology_selected: "OpenLineage + OpenMetadata"
    rationale: |
      - OpenLineage (CNCF project, standard for lineage)
        - Integrations: Airflow, dbt, Spark (auto-capture lineage)
        - Events sent to OpenMetadata
      - OpenMetadata stores lineage (already using for catalog)
      - UI shows cross-domain lineage graph
    cost: "$0 (included in OpenMetadata - L2-001)"

  L3-003: Schema_Registry
    purpose: "Centralized schema catalog, compatibility checking"
    required_capabilities:
      - Schema versioning (v1, v2, v3)
      - Compatibility checking (backward, forward, full)
      - Schema formats (Avro, Protobuf, JSON Schema)
    technology_selected: "Confluent Schema Registry (open-source)"
    rationale: |
      - OSS version of Confluent Schema Registry (no licensing)
      - REST API for registration, retrieval
      - Compatibility modes (BACKWARD, FORWARD, FULL)
      - Used by: publishing workflow (validate before publish)
    cost: "$50/month (EC2 instance for registry)"
    alternatives_considered:
      - "AWS Glue Schema Registry: AWS-native, free, but less features"
      - "Custom: PostgreSQL + JSON Schema validator (more work)"

  L3-004: Federated_Catalog_Aggregator
    purpose: "Unified search across all domain catalogs"
    note: "OpenMetadata already provides federated search"
    technology_selected: "OpenMetadata (single instance, all domains)"
    rationale: |
      - OpenMetadata deployed as single shared instance
      - All domains publish to same catalog (namespace per domain)
      - Single search index spans all domains
      - RBAC ensures domains only see what they're allowed
    cost: "$0 (included in OpenMetadata - L2-001)"

  L3-005: Self_Serve_Data_Platform
    purpose: "Platform infrastructure (IaC, multi-tenancy, cost tracking)"
    required_capabilities:
      - Infrastructure-as-code (Terraform)
      - Multi-tenancy (AWS accounts per domain OR shared account with isolation)
      - Cost tracking (AWS Cost Explorer API)
      - Resource provisioning (S3, Athena, Glue, etc.)
    technology_selected: "Terraform + AWS Organizations + Cost Allocation Tags"
    rationale: |
      - Terraform modules for common resources (S3 bucket, Athena workgroup, etc.)
      - AWS Organizations: Separate AWS account per domain (strong isolation)
      - Cost Allocation Tags: Track spend per domain (for chargeback)
      - Platform team maintains Terraform modules, domains use via templates
    cost: "$100/month (AWS Organizations, FinOps tools)"
    alternatives_considered:
      - "Pulumi: Modern IaC, but team prefers Terraform"
      - "CloudFormation: AWS-native, but less flexible than Terraform"

level_3_total_cost: "$2,160/month (shared platform infrastructure)"

